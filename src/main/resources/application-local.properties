server.port=8080

# MySQL Configuration
SPRING_DATASOURCE_URL=jdbc:mysql://localhost:8889/RECETTE?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# MongoDB Configuration
spring.data.mongodb.uri=mongodb+srv://user:password@cluster.mongodb.net/?retryWrites=true&w=majority
spring.data.mongodb.database=ProjetRecette
spring.data.mongodb.ssl.enabled=true
spring.data.mongodb.ssl.invalid-hostname-allowed=true

# Spring Configuration
spring.main.allow-bean-definition-overriding=true

# JWT Configuration
jwt.expiration=86400000
jwt.secret=your-secret-key-change-this-in-production

# Twilio Configuration
twilio.account_sid=your-twilio-sid
twilio.auth_token=your-twilio-token

# API Documentation
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

debug=true
